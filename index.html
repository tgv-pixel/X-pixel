<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zbet - Login with Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation div {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            bottom: -150px;
            animation: float 25s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 0;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        /* Form container */
        .form-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .tab.active {
            color: #ffd700;
            border-bottom: 2px solid #ffd700;
            margin-bottom: -2px;
        }

        /* Forms */
        .form {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .form.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input groups */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 2px #ffd700;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #ffd89b, #c7e9fb);
            color: #333;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Telegram button */
        .telegram-btn {
            background: linear-gradient(45deg, #0088cc, #00aaff);
            color: #fff;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .telegram-btn:hover {
            background: linear-gradient(45deg, #006699, #0088cc);
        }

        /* Divider */
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: rgba(255, 255, 255, 0.1);
            padding: 0 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        /* Message */
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(244, 67, 54, 0.3);
            display: block;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
            display: block;
        }

        .message.info {
            background: rgba(33, 150, 243, 0.2);
            color: #64b5f6;
            border: 1px solid rgba(33, 150, 243, 0.3);
            display: block;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-container {
                padding: 25px;
            }
            
            .logo h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    
    <div class="container">
        <div class="logo">
            <h1>🎲 zbet</h1>
            <p>Your Ultimate Betting Platform</p>
        </div>
        
        <div class="form-container">
            <div class="tabs">
                <div class="tab active" data-tab="login">Login</div>
                <div class="tab" data-tab="register">Register</div>
            </div>
            
            <!-- Login Form -->
            <div class="form active" id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button class="btn" onclick="loginWithEmail()">Login</button>
                
                <div class="divider">
                    <span>OR</span>
                </div>
                
                <button class="btn telegram-btn" onclick="loginWithTelegram()">
                    📱 Login with Telegram
                </button>
                
                <div id="loginMessage" class="message"></div>
            </div>
            
            <!-- Register Form -->
            <div class="form" id="registerForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password (min 6 characters)">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password">
                </div>
                <button class="btn" onclick="registerWithEmail()">Create Account</button>
                
                <div class="divider">
                    <span>OR</span>
                </div>
                
                <button class="btn telegram-btn" onclick="registerWithTelegram()">
                    📱 Sign up with Telegram
                </button>
                
                <div id="registerMessage" class="message"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>🔒 Secure Login • 🎮 Instant Access • 💰 Start with 1000 ZBET</p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a",
            measurementId: "G-53BEVW33FP"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        // Function to generate random username
        function generateRandomUsername() {
            const adjectives = ['Lucky', 'Wild', 'Crazy', 'Smart', 'Fast', 'Bold', 'Epic', 'Mighty', 'Super', 'Ultra'];
            const nouns = ['Player', 'Gamer', 'Winner', 'Champion', 'Master', 'King', 'Queen', 'Star', 'Hero', 'Legend'];
            const randomNum = Math.floor(Math.random() * 1000);
            const randomAdj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const randomNoun = nouns[Math.floor(Math.random() * nouns.length)];
            return `${randomAdj}${randomNoun}${randomNum}`;
        }
        
        // Telegram Login (simulated - no extra setup needed)
        window.loginWithTelegram = async () => {
            const messageDiv = document.getElementById('loginMessage');
            showMessage(messageDiv, 'Connecting to Telegram...', 'info');
            
            // Simulate Telegram login with random data
            setTimeout(async () => {
                try {
                    // Generate random Telegram user data
                    const telegramId = `telegram_${Math.random().toString(36).substr(2, 9)}`;
                    const randomUsername = generateRandomUsername();
                    const telegramEmail = `${telegramId}@telegram.zbet`;
                    
                    // Create a fake user object
                    const user = {
                        uid: telegramId,
                        email: telegramEmail,
                        displayName: randomUsername,
                        telegramId: telegramId
                    };
                    
                    // Check if user exists in database
                    const userRef = ref(database, `users/${telegramId}`);
                    const snapshot = await get(userRef);
                    
                    if (!snapshot.exists()) {
                        // Create new user profile
                        const userData = {
                            uid: telegramId,
                            username: randomUsername,
                            email: telegramEmail,
                            telegramId: telegramId,
                            balance: 1000,
                            createdAt: new Date().toISOString(),
                            totalBets: 0,
                            totalWins: 0,
                            totalLosses: 0,
                            authMethod: 'telegram'
                        };
                        await set(ref(database, `users/${telegramId}`), userData);
                    }
                    
                    // Get user data
                    const userSnapshot = await get(userRef);
                    const userData = userSnapshot.exists() ? userSnapshot.val() : { balance: 1000, username: randomUsername };
                    
                    // Store in localStorage
                    localStorage.setItem('zbet_user', JSON.stringify({
                        uid: telegramId,
                        email: telegramEmail,
                        username: userData.username,
                        balance: userData.balance || 1000,
                        authMethod: 'telegram'
                    }));
                    
                    showMessage(messageDiv, 'Telegram login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'zbet-game.html';
                    }, 1500);
                    
                } catch (error) {
                    showMessage(messageDiv, 'Telegram login failed: ' + error.message, 'error');
                }
            }, 1000);
        };
        
        // Telegram Register
        window.registerWithTelegram = async () => {
            const messageDiv = document.getElementById('registerMessage');
            showMessage(messageDiv, 'Connecting to Telegram...', 'info');
            
            // Simulate Telegram registration
            setTimeout(async () => {
                try {
                    const telegramId = `telegram_${Math.random().toString(36).substr(2, 9)}`;
                    const randomUsername = generateRandomUsername();
                    const telegramEmail = `${telegramId}@telegram.zbet`;
                    
                    // Check if user already exists
                    const userRef = ref(database, `users/${telegramId}`);
                    const snapshot = await get(userRef);
                    
                    if (snapshot.exists()) {
                        showMessage(messageDiv, 'Telegram account already registered. Please login.', 'error');
                        return;
                    }
                    
                    // Create new user
                    const userData = {
                        uid: telegramId,
                        username: randomUsername,
                        email: telegramEmail,
                        telegramId: telegramId,
                        balance: 1000,
                        createdAt: new Date().toISOString(),
                        totalBets: 0,
                        totalWins: 0,
                        totalLosses: 0,
                        authMethod: 'telegram'
                    };
                    
                    await set(ref(database, `users/${telegramId}`), userData);
                    
                    // Store in localStorage
                    localStorage.setItem('zbet_user', JSON.stringify({
                        uid: telegramId,
                        email: telegramEmail,
                        username: randomUsername,
                        balance: 1000,
                        authMethod: 'telegram'
                    }));
                    
                    showMessage(messageDiv, `Welcome ${randomUsername}! Account created successfully! Redirecting...`, 'success');
                    setTimeout(() => {
                        window.location.href = 'zbet-game.html';
                    }, 1500);
                    
                } catch (error) {
                    showMessage(messageDiv, 'Telegram registration failed: ' + error.message, 'error');
                }
            }, 1000);
        };
        
        // Email Login
        window.loginWithEmail = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');
            
            if (!email || !password) {
                showMessage(messageDiv, 'Please fill in all fields', 'error');
                return;
            }
            
            showMessage(messageDiv, 'Logging in...', 'info');
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Get user data from database
                const userRef = ref(database, `users/${user.uid}`);
                const snapshot = await get(userRef);
                
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    localStorage.setItem('zbet_user', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        username: userData.username,
                        balance: userData.balance || 1000,
                        authMethod: 'email'
                    }));
                }
                
                showMessage(messageDiv, 'Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'zbet-game.html';
                }, 1500);
                
            } catch (error) {
                let errorMessage = 'Login failed. ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage += 'User not found. Please register first.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage += 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage += 'Invalid email format.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                showMessage(messageDiv, errorMessage, 'error');
            }
        };
        
        // Email Registration
        window.registerWithEmail = async () => {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const messageDiv = document.getElementById('registerMessage');
            
            if (!email || !password || !confirmPassword) {
                showMessage(messageDiv, 'Please fill in all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage(messageDiv, 'Password must be at least 6 characters', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage(messageDiv, 'Passwords do not match', 'error');
                return;
            }
            
            showMessage(messageDiv, 'Creating account...', 'info');
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const randomUsername = generateRandomUsername();
                
                // Store user data in Firebase Realtime Database
                const userData = {
                    uid: user.uid,
                    username: randomUsername,
                    email: email,
                    balance: 1000,
                    createdAt: new Date().toISOString(),
                    totalBets: 0,
                    totalWins: 0,
                    totalLosses: 0,
                    authMethod: 'email'
                };
                
                await set(ref(database, `users/${user.uid}`), userData);
                
                localStorage.setItem('zbet_user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    username: randomUsername,
                    balance: 1000,
                    authMethod: 'email'
                }));
                
                showMessage(messageDiv, `Welcome ${randomUsername}! Account created successfully! Redirecting...`, 'success');
                setTimeout(() => {
                    window.location.href = 'zbet-game.html';
                }, 1500);
                
            } catch (error) {
                let errorMessage = 'Registration failed. ';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage += 'Email already registered. Please login instead.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage += 'Invalid email format.';
                        break;
                    case 'auth/weak-password':
                        errorMessage += 'Password is too weak.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                showMessage(messageDiv, errorMessage, 'error');
            }
        };
        
        // Helper function to show messages
        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
            setTimeout(() => {
                if (element.className === `message ${type}`) {
                    element.style.display = 'none';
                    element.className = 'message';
                }
            }, 5000);
        }
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));
                if (tabName === 'login') {
                    document.getElementById('loginForm').classList.add('active');
                } else {
                    document.getElementById('registerForm').classList.add('active');
                }
                
                document.getElementById('loginMessage').className = 'message';
                document.getElementById('registerMessage').className = 'message';
            });
        });
        
        // Animated background
        function createBubbles() {
            const bgAnimation = document.getElementById('bgAnimation');
            const bubbleCount = 20;
            
            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                const size = Math.random() * 60 + 20;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 100}%`;
                bubble.style.animationDelay = `${Math.random() * 20}s`;
                bubble.style.animationDuration = `${Math.random() * 15 + 10}s`;
                bgAnimation.appendChild(bubble);
            }
        }
        
        createBubbles();
        
        // Add enter key support
        document.getElementById('loginEmail')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.loginWithEmail();
        });
        document.getElementById('loginPassword')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.loginWithEmail();
        });
        document.getElementById('regEmail')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.registerWithEmail();
        });
        document.getElementById('regPassword')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.registerWithEmail();
        });
    </script>
</body>
</html>
