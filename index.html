<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF‑edit · style & colour · save download</title>
    <!-- pdf-lib & fontkit (CDN) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
    <!-- FileSaver for download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fb;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            padding: 30px 30px 40px;
        }
        h1 {
            font-weight: 500;
            font-size: 2rem;
            color: #1e293b;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1 small {
            font-size: 0.9rem;
            background: #e9eef3;
            color: #334155;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 400;
        }
        .toolbar {
            background: #f8fafc;
            border-radius: 60px;
            padding: 18px 24px;
            margin: 25px 0 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px 30px;
            border: 1px solid #dee4ed;
        }
        .tool-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .tool-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            color: #1e293b;
        }
        .tool-label i {
            opacity: 0.7;
        }
        select, input[type="color"], input[type="number"] {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: 0.15s;
        }
        select:hover, input:hover {
            border-color: #64748b;
        }
        input[type="color"] {
            width: 50px;
            height: 42px;
            padding: 4px;
        }
        input[type="number"] {
            width: 85px;
        }
        button {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 500;
            font-size: 0.95rem;
            color: #1e293b;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        button.primary {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
            box-shadow: 0 4px 10px rgba(0,40,80,0.15);
        }
        button.primary:hover {
            background: #0f172a;
        }
        button:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .pdf-area {
            background: #e9eef3;
            border-radius: 28px;
            padding: 20px;
            border: 2px dashed #b9c7da;
            margin: 20px 0 25px;
            min-height: 380px;
            display: flex;
            flex-direction: column;
        }
        .pdf-header {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .file-input-label {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            border: 2px solid #94a3b8;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .file-input-label input {
            position: absolute;
            opacity: 0;
            width: 0.1px;
        }
        #pageInfo {
            background: white;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            border: 1px solid #ccd9e9;
            color: #1e293b;
        }
        .canvas-wrapper {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
            overflow: auto;
            max-height: 550px;
            display: flex;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        #pdfCanvas {
            display: block;
            width: 100%;
            height: auto;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .text-layer {
            position: relative;
            display: inline-block; /* fit canvas size */
        }
        .text-layer canvas {
            display: block;
        }
        .edit-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; /* let clicks pass to canvas? we'll handle via mousedown on wrapper */
        }
        .edit-instruction {
            background: #fff8e7;
            padding: 12px 20px;
            border-radius: 50px;
            border-left: 4px solid #f3b33d;
            font-size: 0.95rem;
            margin: 10px 0 0;
        }
        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            flex-wrap: wrap;
        }
        #statusMsg {
            color: #475569;
            font-size: 0.95rem;
            background: #f1f4f9;
            padding: 6px 18px;
            border-radius: 40px;
        }
        hr {
            border: none;
            border-top: 1px solid #dce3ec;
            margin: 25px 0 15px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>✎ PDF text editor <small>style · colour · download</small></h1>

    <div class="toolbar">
        <div class="tool-group">
            <span class="tool-label"><i>🖊️</i> Font</span>
            <select id="fontSelect">
                <option value="Helvetica">Helvetica (sans)</option>
                <option value="TimesRoman">Times Roman (serif)</option>
                <option value="Courier">Courier (mono)</option>
                <option value="Symbol">Symbol</option>
                <option value="ZapfDingbats">ZapfDingbats</option>
            </select>
        </div>
        <div class="tool-group">
            <span class="tool-label"><i>🎨</i> Colour</span>
            <input type="color" id="colorPicker" value="#1e293b">
        </div>
        <div class="tool-group">
            <span class="tool-label"><i>🔠</i> Size</span>
            <input type="number" id="fontSize" min="6" max="120" value="24" step="1">
        </div>
        <div style="flex:1; min-width:100px;"></div>
        <button id="savePdfBtn" class="primary"><span>💾</span> Save changes & download PDF</button>
    </div>

    <!-- PDF upload & canvas display -->
    <div class="pdf-area">
        <div class="pdf-header">
            <label class="file-input-label">
                📂 <span>Upload PDF</span>
                <input type="file" id="fileInput" accept="application/pdf">
            </label>
            <span id="pageInfo">no PDF loaded</span>
            <span id="statusMsg" style="margin-left:auto;">ready</span>
        </div>

        <div id="canvasContainer" class="canvas-wrapper" style="position: relative; cursor: crosshair;">
            <div id="textLayerDiv" class="text-layer" style="position: relative; display: inline-block;">
                <canvas id="pdfCanvas"></canvas>
                <!-- absolutely positioned DIV to show temporary text while editing (optional) -->
                <div id="tempTextDiv" style="position: absolute; left:0; top:0; pointer-events: none; color: transparent;"> </div>
            </div>
        </div>

        <div class="edit-instruction">
            ⚡ Click anywhere on the PDF to place a new text box. Then edit the overlay text (style/colour applied live). After finishing, click "Save changes & download PDF".
        </div>
    </div>

    <!-- Hidden overlay for quick inline editing (a minimal approach) -->
    <div style="display: flex; gap: 10px; margin-top: 5px; align-items: center;">
        <span style="color:#475569;">✏️ New text:</span>
        <input type="text" id="newTextInput" placeholder="type here..." value="Editable text" style="flex:1; padding: 12px 18px; border-radius: 60px; border:1px solid #b9c7da;">
        <button id="placeTextBtn">➕ Place text at last click</button>
    </div>

    <hr>
    <div class="action-buttons">
        <button id="clearBtn">🗑️ Clear all added texts</button>
    </div>
</div>

<script>
    (function() {
        // --- globals ---
        const { PDFDocument, rgb, StandardFonts } = PDFLib;

        let currentPdfBytes = null;           // original PDF bytes (uploaded)
        let pdfDocument = null;                // pdf-lib document (for saving)
        let canvas = document.getElementById('pdfCanvas');
        let ctx = canvas.getContext('2d');

        // store added text annotations: array of {text, x, y, size, fontName, colorHex }
        let textAnnotations = [];

        // track last click coordinate (relative to canvas)
        let lastClick = { x: 0, y: 0, valid: false };

        // page dimension (after render)
        let currentPageWidth = 0, currentPageHeight = 0;

        // fonts mapping
        const fontMap = {
            'Helvetica': StandardFonts.Helvetica,
            'TimesRoman': StandardFonts.TimesRoman,
            'Courier': StandardFonts.Courier,
            'Symbol': StandardFonts.Symbol,
            'ZapfDingbats': StandardFonts.ZapfDingbats
        };

        // --- helper: render PDF on canvas (first page) and store dimensions ---
        async function renderPdfToCanvas(pdfBytes) {
            try {
                const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 1.5 });  // nice scale
                currentPageWidth = viewport.width;
                currentPageHeight = viewport.height;

                canvas.width = currentPageWidth;
                canvas.height = currentPageHeight;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport,
                };
                await page.render(renderContext).promise;
                document.getElementById('pageInfo').innerText = `page 1 · ${Math.round(currentPageWidth)} x ${Math.round(currentPageHeight)} px`;
            } catch (e) {
                console.error(e);
                alert('Failed to render PDF preview.');
            }
        }

        // --- redraw canvas background + overlay texts (for preview) ---
        function redrawPreviewWithAnnotations() {
            if (!currentPdfBytes) return;
            // render PDF first (background) then draw texts via canvas
            const loadingTask = pdfjsLib.getDocument({ data: currentPdfBytes });
            loadingTask.promise.then(pdf => {
                return pdf.getPage(1).then(page => {
                    const viewport = page.getViewport({ scale: 1.5 });
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport,
                    };
                    return page.render(renderContext).promise;
                });
            }).then(() => {
                // after background, draw each text annotation
                ctx.font = '16px sans-serif'; // not used, but we set manually
                textAnnotations.forEach(t => {
                    ctx.font = `${t.size}px ${mapFontNameToCSS(t.fontName)}`;
                    ctx.fillStyle = t.colorHex;
                    ctx.fillText(t.text, t.x, t.y);
                });
            }).catch(e => console.warn('redraw issue', e));
        }

        // map standard font to css friendly name
        function mapFontNameToCSS(fontName) {
            if (fontName === 'Helvetica' || fontName === 'TimesRoman' || fontName === 'Courier') {
                if (fontName === 'TimesRoman') return 'Times New Roman, serif';
                if (fontName === 'Courier') return 'Courier New, monospace';
                return 'Helvetica, sans-serif';
            }
            return 'sans-serif';
        }

        // --- place new text using current style ---
        function addAnnotationAt(x, y, customText) {
            const text = customText || document.getElementById('newTextInput').value || 'text';
            const size = parseInt(document.getElementById('fontSize').value, 10);
            const fontName = document.getElementById('fontSelect').value;  // e.g. "Helvetica"
            const colorHex = document.getElementById('colorPicker').value;

            textAnnotations.push({
                text: text,
                x: x,
                y: y,
                size: size,
                fontName: fontName,
                colorHex: colorHex
            });
            redrawPreviewWithAnnotations();
            document.getElementById('statusMsg').innerText = `+ text at (${Math.round(x)},${Math.round(y)})`;
        }

        // --- handle click on canvas container ---
        document.getElementById('canvasContainer').addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            if (clickX >= 0 && clickX <= canvas.width && clickY >=0 && clickY <= canvas.height) {
                lastClick = { x: clickX, y: clickY, valid: true };
                // optional visual indicator
                document.getElementById('statusMsg').innerHTML = `📌 click at (${Math.round(clickX)},${Math.round(clickY)}) — use "Place text"`;
            } else {
                lastClick.valid = false;
            }
        });

        // place text at last click
        document.getElementById('placeTextBtn').addEventListener('click', () => {
            if (!currentPdfBytes) {
                alert('Upload a PDF first.');
                return;
            }
            if (!lastClick.valid) {
                alert('Click on the PDF preview to set position.');
                return;
            }
            addAnnotationAt(lastClick.x, lastClick.y, document.getElementById('newTextInput').value);
        });

        // --- upload handler ---
        document.getElementById('fileInput').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const arrayBuffer = await file.arrayBuffer();
            currentPdfBytes = new Uint8Array(arrayBuffer);

            // load pdf-lib document for later saving
            try {
                pdfDocument = await PDFDocument.load(currentPdfBytes);
                // register fontkit for non-standard (but we only use standard, safe)
                pdfDocument.registerFontkit(fontkit);
            } catch (e) {
                alert('Failed to parse PDF with pdf-lib');
                console.error(e);
                return;
            }

            // render preview using pdf.js (we load from same bytes)
            await renderPdfToCanvas(currentPdfBytes);
            textAnnotations = []; // reset annotations when new file loaded
            lastClick.valid = false;
            document.getElementById('statusMsg').innerText = `"${file.name}" loaded`;
        });

        // --- save & download ---
        document.getElementById('savePdfBtn').addEventListener('click', async () => {
            if (!pdfDocument) {
                alert('No PDF loaded. Please upload a PDF first.');
                return;
            }

            try {
                // we need to embed fonts (standard ones are fine)
                const pages = pdfDocument.getPages();
                const firstPage = pages[0]; // we only edit first page (for simplicity)
                if (!firstPage) throw new Error('PDF has no pages');

                // embed standard fonts (each once)
                const fontCache = {};
                for (let fontName of new Set(textAnnotations.map(t => t.fontName))) {
                    const stdFont = fontMap[fontName];
                    if (stdFont) {
                        fontCache[fontName] = await pdfDocument.embedFont(stdFont);
                    } else {
                        // fallback
                        fontCache[fontName] = await pdfDocument.embedFont(StandardFonts.Helvetica);
                    }
                }

                // draw each annotation
                for (let t of textAnnotations) {
                    const fontToUse = fontCache[t.fontName] || fontCache['Helvetica'];
                    // convert hex to rgb (0-1)
                    const hex = t.colorHex.replace('#', '');
                    const r = parseInt(hex.substring(0,2), 16)/255;
                    const g = parseInt(hex.substring(2,4), 16)/255;
                    const b = parseInt(hex.substring(4,6), 16)/255;

                    firstPage.drawText(t.text, {
                        x: t.x / 1.5,        // because preview scale was 1.5, need revert to pdf coordinates
                        y: firstPage.getHeight() - (t.y / 1.5), // flip y: pdf origin bottom-left, canvas top-left
                        size: t.size / 1.5,
                        font: fontToUse,
                        color: rgb(r, g, b),
                    });
                }

                // save
                const pdfBytes = await pdfDocument.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                saveAs(blob, 'edited_document.pdf');
                document.getElementById('statusMsg').innerText = '✅ PDF downloaded with your text.';
            } catch (error) {
                console.error(error);
                alert('Error during PDF generation: ' + error.message);
            }
        });

        // --- clear all texts ---
        document.getElementById('clearBtn').addEventListener('click', () => {
            textAnnotations = [];
            redrawPreviewWithAnnotations();
            document.getElementById('statusMsg').innerHTML = '🧹 All added texts cleared';
        });

        // --- live style change: re-draw preview to reflect new font/size/color on existing? optionally, but we only preview them on redraw.
        // We simply update preview if needed via button.
        // But we can add a small 'refresh preview' on style change:
        document.getElementById('fontSelect').addEventListener('change', () => redrawPreviewWithAnnotations());
        document.getElementById('colorPicker').addEventListener('input', () => redrawPreviewWithAnnotations());
        document.getElementById('fontSize').addEventListener('input', () => redrawPreviewWithAnnotations());

        // load pdf.js from cdn
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
        script.onload = () => {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        };
        document.head.appendChild(script);
    })();
</script>
<!-- include pdf.js lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</body>
</html>
