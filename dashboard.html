<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zbet - Wallet & Transactions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .user-details {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            text-align: right;
        }

        .username {
            font-weight: bold;
            color: #ffd700;
        }

        .email {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .balance {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-weight: bold;
        }

        .balance span {
            color: #ffd700;
            font-size: 1.2rem;
        }

        .logout-btn, .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .logout-btn:hover, .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Wallet Cards */
        .wallet-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .wallet-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
        }

        .wallet-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .wallet-amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
            margin: 1rem 0;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
        }

        .action-btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .deposit-btn {
            background: linear-gradient(45deg, #4caf50, #45a049);
            color: white;
        }

        .withdraw-btn {
            background: linear-gradient(45deg, #ff9800, #f57c00);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close {
            font-size: 1.5rem;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            box-shadow: 0 0 0 2px #ffd700;
        }

        .payment-details {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }

        .payment-details p {
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }

        .copy-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(45deg, #ffd89b, #c7e9fb);
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: scale(1.02);
        }

        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 10px;
            display: none;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
            display: block;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
            display: block;
        }

        .message.info {
            background: rgba(33, 150, 243, 0.3);
            color: #2196f3;
            display: block;
        }

        /* Transactions List */
        .transactions-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .transactions-list {
            margin-top: 1rem;
        }

        .transaction-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .transaction-status {
            padding: 0.25rem 0.5rem;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-pending {
            background: #ff9800;
            color: white;
        }

        .status-approved {
            background: #4caf50;
            color: white;
        }

        .status-rejected {
            background: #f44336;
            color: white;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎲 zbet</div>
        <div class="user-info">
            <a href="zbet-game.html" class="back-btn">🎮 Back to Games</a>
            <div class="user-details">
                <div class="username" id="username">Loading...</div>
                <div class="email" id="email">Loading...</div>
            </div>
            <div class="balance">Balance: <span id="balance">0</span> ZBET</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="wallet-section">
            <div class="wallet-card">
                <h3>💰 Available Balance</h3>
                <div class="wallet-amount" id="walletBalance">0 ZBET</div>
                <p>1 USDT = 157 ZBET</p>
                <p>Minimum Withdrawal: 100 ZBET</p>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn deposit-btn" onclick="openDepositModal()">📥 Deposit Funds</button>
            <button class="action-btn withdraw-btn" onclick="openWithdrawModal()">📤 Withdraw Funds</button>
        </div>

        <div class="transactions-section">
            <h3>📋 Transaction History</h3>
            <div id="transactionsList" class="transactions-list">
                <p>Loading transactions...</p>
            </div>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Deposit Funds</h2>
                <span class="close" onclick="closeDepositModal()">&times;</span>
            </div>
            <div class="form-group">
                <label>Select Payment Method</label>
                <select id="depositMethod" onchange="showDepositDetails()">
                    <option value="">Choose method</option>
                    <option value="cbe">CBE (Commercial Bank of Ethiopia)</option>
                    <option value="telegram">Telebirr</option>
                    <option value="mpesa">M-Pesa</option>
                    <option value="usdt">TRC20 USDT</option>
                </select>
            </div>
            <div id="depositDetails"></div>
            <div class="form-group">
                <label>Amount (in ZBET)</label>
                <input type="number" id="depositAmount" placeholder="Enter amount to deposit">
            </div>
            <div class="form-group">
                <label>Transaction Reference / Screenshot</label>
                <input type="text" id="transactionRef" placeholder="Enter transaction ID or reference">
            </div>
            <button class="submit-btn" onclick="submitDeposit()">Submit Deposit Request</button>
            <div id="depositMessage" class="message"></div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Withdraw Funds</h2>
                <span class="close" onclick="closeWithdrawModal()">&times;</span>
            </div>
            <div class="form-group">
                <label>Select Withdrawal Method</label>
                <select id="withdrawMethod" onchange="showWithdrawDetails()">
                    <option value="">Choose method</option>
                    <option value="cbe">CBE (Commercial Bank of Ethiopia)</option>
                    <option value="telegram">Telebirr</option>
                    <option value="mpesa">M-Pesa</option>
                    <option value="usdt">TRC20 USDT</option>
                </select>
            </div>
            <div id="withdrawDetails"></div>
            <div class="form-group">
                <label>Amount (in ZBET)</label>
                <input type="number" id="withdrawAmount" placeholder="Enter amount to withdraw (Min: 100)">
            </div>
            <div class="form-group">
                <label>Account Details</label>
                <input type="text" id="accountDetails" placeholder="Enter your account number / phone number">
            </div>
            <div class="form-group">
                <label>Account Name</label>
                <input type="text" id="accountName" placeholder="Enter your account name">
            </div>
            <div class="form-group">
                <label>Password Confirmation</label>
                <input type="password" id="withdrawPassword" placeholder="Enter your password to confirm">
            </div>
            <button class="submit-btn" onclick="submitWithdraw()">Submit Withdrawal Request</button>
            <div id="withdrawMessage" class="message"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, update, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a",
            measurementId: "G-53BEVW33FP"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        let currentUser = null;
        let userBalance = 0;
        
        // Payment details
        const paymentMethods = {
            cbe: {
                name: "CBE (Commercial Bank of Ethiopia)",
                account: "1000612391754",
                name: "Abenezer Shigute Menore"
            },
            telegram: {
                name: "Telebirr",
                account: "0940980554",
                name: "Tenaye Hutalo Ejute"
            },
            mpesa: {
                name: "M-Pesa",
                account: "0725032395",
                name: "Abenezer Shigute Menore"
            },
            usdt: {
                name: "TRC20 USDT",
                address: "TWym3qg8TUNTyutMxvPpnatjeWs8C7jsLY",
                rate: 157 // 1 USDT = 157 ZBET
            }
        };
        
        // Check authentication
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData(user.uid);
                loadTransactions();
            } else {
                const localUser = localStorage.getItem('zbet_user');
                if (localUser) {
                    const parsedUser = JSON.parse(localUser);
                    await loadTelegramUserData(parsedUser);
                    loadTransactions();
                } else {
                    window.location.href = 'zbet-login.html';
                }
            }
        });
        
        async function loadTelegramUserData(userInfo) {
            const userRef = ref(database, `users/${userInfo.uid}`);
            const snapshot = await get(userRef);
            
            if (snapshot.exists()) {
                const userData = snapshot.val();
                userBalance = userData.balance || 1000;
                document.getElementById('username').textContent = userData.username;
                document.getElementById('email').textContent = userData.email;
                document.getElementById('balance').textContent = userBalance;
                document.getElementById('walletBalance').textContent = userBalance + ' ZBET';
            }
        }
        
        async function loadUserData(uid) {
            const userRef = ref(database, `users/${uid}`);
            const snapshot = await get(userRef);
            
            if (snapshot.exists()) {
                const userData = snapshot.val();
                userBalance = userData.balance || 1000;
                document.getElementById('username').textContent = userData.username;
                document.getElementById('email').textContent = userData.email;
                document.getElementById('balance').textContent = userBalance;
                document.getElementById('walletBalance').textContent = userBalance + ' ZBET';
            }
        }
        
        async function loadTransactions() {
            const userId = currentUser ? currentUser.uid : JSON.parse(localStorage.getItem('zbet_user'))?.uid;
            if (!userId) return;
            
            const transactionsRef = ref(database, `transactions/${userId}`);
            const snapshot = await get(transactionsRef);
            
            const transactionsList = document.getElementById('transactionsList');
            
            if (!snapshot.exists()) {
                transactionsList.innerHTML = '<p>No transactions yet</p>';
                return;
            }
            
            const transactions = Object.entries(snapshot.val()).reverse();
            transactionsList.innerHTML = transactions.map(([key, trans]) => `
                <div class="transaction-item">
                    <div>
                        <strong>${trans.type === 'deposit' ? '📥 Deposit' : '📤 Withdraw'}</strong><br>
                        <small>${new Date(trans.timestamp).toLocaleString()}</small>
                    </div>
                    <div>
                        Amount: ${trans.amount} ZBET<br>
                        Method: ${trans.method}
                    </div>
                    <div>
                        <span class="transaction-status status-${trans.status}">${trans.status}</span>
                    </div>
                </div>
            `).join('');
        }
        
        window.openDepositModal = () => {
            document.getElementById('depositModal').style.display = 'flex';
        };
        
        window.closeDepositModal = () => {
            document.getElementById('depositModal').style.display = 'none';
            document.getElementById('depositDetails').innerHTML = '';
            document.getElementById('depositAmount').value = '';
            document.getElementById('transactionRef').value = '';
        };
        
        window.openWithdrawModal = () => {
            document.getElementById('withdrawModal').style.display = 'flex';
        };
        
        window.closeWithdrawModal = () => {
            document.getElementById('withdrawModal').style.display = 'none';
            document.getElementById('withdrawDetails').innerHTML = '';
            document.getElementById('withdrawAmount').value = '';
            document.getElementById('accountDetails').value = '';
            document.getElementById('accountName').value = '';
            document.getElementById('withdrawPassword').value = '';
        };
        
        window.showDepositDetails = () => {
            const method = document.getElementById('depositMethod').value;
            const detailsDiv = document.getElementById('depositDetails');
            
            if (!method) {
                detailsDiv.innerHTML = '';
                return;
            }
            
            const payment = paymentMethods[method];
            if (method === 'usdt') {
                detailsDiv.innerHTML = `
                    <div class="payment-details">
                        <p><strong>Send USDT (TRC20) to:</strong></p>
                        <p>Address: ${payment.address}</p>
                        <p>Network: TRC20</p>
                        <p>Rate: 1 USDT = ${payment.rate} ZBET</p>
                        <button class="copy-btn" onclick="copyToClipboard('${payment.address}')">Copy Address</button>
                    </div>
                `;
            } else {
                detailsDiv.innerHTML = `
                    <div class="payment-details">
                        <p><strong>Send to:</strong></p>
                        <p>Account: ${payment.account}</p>
                        <p>Name: ${payment.name}</p>
                        <button class="copy-btn" onclick="copyToClipboard('${payment.account}')">Copy Account</button>
                    </div>
                `;
            }
        };
        
        window.showWithdrawDetails = () => {
            const method = document.getElementById('withdrawMethod').value;
            const detailsDiv = document.getElementById('withdrawDetails');
            
            if (!method) {
                detailsDiv.innerHTML = '';
                return;
            }
            
            const payment = paymentMethods[method];
            if (method === 'usdt') {
                detailsDiv.innerHTML = `
                    <div class="payment-details">
                        <p><strong>You will receive:</strong></p>
                        <p>Amount in USDT: <span id="usdtAmount">0</span> USDT</p>
                        <p>Network: TRC20</p>
                        <p>Rate: 1 USDT = ${payment.rate} ZBET</p>
                    </div>
                `;
                
                document.getElementById('withdrawAmount').addEventListener('input', () => {
                    const amount = parseFloat(document.getElementById('withdrawAmount').value);
                    if (!isNaN(amount)) {
                        const usdt = (amount / payment.rate).toFixed(2);
                        document.getElementById('usdtAmount').textContent = usdt;
                    }
                });
            }
        };
        
        window.submitDeposit = async () => {
            const method = document.getElementById('depositMethod').value;
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const reference = document.getElementById('transactionRef').value;
            const messageDiv = document.getElementById('depositMessage');
            
            if (!method) {
                showMessage(messageDiv, 'Please select payment method', 'error');
                return;
            }
            
            if (!amount || amount <= 0) {
                showMessage(messageDiv, 'Please enter valid amount', 'error');
                return;
            }
            
            if (!reference) {
                showMessage(messageDiv, 'Please enter transaction reference', 'error');
                return;
            }
            
            const userId = currentUser ? currentUser.uid : JSON.parse(localStorage.getItem('zbet_user'))?.uid;
            
            const transaction = {
                type: 'deposit',
                method: method,
                amount: amount,
                reference: reference,
                status: 'pending',
                timestamp: new Date().toISOString(),
                userId: userId,
                userName: document.getElementById('username').textContent
            };
            
            try {
                const transactionsRef = ref(database, `transactions/${userId}`);
                const newTransactionRef = push(transactionsRef);
                await set(newTransactionRef, transaction);
                
                // Also add to admin transactions
                const adminRef = ref(database, `admin_transactions/${newTransactionRef.key}`);
                await set(adminRef, transaction);
                
                showMessage(messageDiv, 'Deposit request submitted! Awaiting admin approval.', 'success');
                setTimeout(() => {
                    closeDepositModal();
                    loadTransactions();
                }, 2000);
            } catch (error) {
                showMessage(messageDiv, 'Error: ' + error.message, 'error');
            }
        };
        
        window.submitWithdraw = async () => {
            const method = document.getElementById('withdrawMethod').value;
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const accountDetails = document.getElementById('accountDetails').value;
            const accountName = document.getElementById('accountName').value;
            const password = document.getElementById('withdrawPassword').value;
            const messageDiv = document.getElementById('withdrawMessage');
            
            if (!method) {
                showMessage(messageDiv, 'Please select withdrawal method', 'error');
                return;
            }
            
            if (!amount || amount < 100) {
                showMessage(messageDiv, 'Minimum withdrawal is 100 ZBET', 'error');
                return;
            }
            
            if (amount > userBalance) {
                showMessage(messageDiv, 'Insufficient balance', 'error');
                return;
            }
            
            if (!accountDetails || !accountName) {
                showMessage(messageDiv, 'Please enter account details', 'error');
                return;
            }
            
            if (!password) {
                showMessage(messageDiv, 'Please enter your password to confirm', 'error');
                return;
            }
            
            const userId = currentUser ? currentUser.uid : JSON.parse(localStorage.getItem('zbet_user'))?.uid;
            
            // Verify password (for email users)
            if (currentUser) {
                try {
                    // You would need to re-authenticate here
                    // For now, we'll just check if password is not empty
                    if (password.length < 1) {
                        showMessage(messageDiv, 'Invalid password', 'error');
                        return;
                    }
                } catch (error) {
                    showMessage(messageDiv, 'Password verification failed', 'error');
                    return;
                }
            }
            
            const transaction = {
                type: 'withdraw',
                method: method,
                amount: amount,
                accountDetails: accountDetails,
                accountName: accountName,
                status: 'pending',
                timestamp: new Date().toISOString(),
                userId: userId,
                userName: document.getElementById('username').textContent,
                email: document.getElementById('email').textContent
            };
            
            try {
                const transactionsRef = ref(database, `transactions/${userId}`);
                const newTransactionRef = push(transactionsRef);
                await set(newTransactionRef, transaction);
                
                // Also add to admin transactions
                const adminRef = ref(database, `admin_transactions/${newTransactionRef.key}`);
                await set(adminRef, transaction);
                
                showMessage(messageDiv, 'Withdrawal request submitted! Awaiting admin approval.', 'success');
                setTimeout(() => {
                    closeWithdrawModal();
                    loadTransactions();
                }, 2000);
            } catch (error) {
                showMessage(messageDiv, 'Error: ' + error.message, 'error');
            }
        };
        
        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        };
        
        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
            setTimeout(() => {
                element.style.display = 'none';
                element.className = 'message';
            }, 5000);
        }
        
        window.logout = async () => {
            if (auth.currentUser) {
                await signOut(auth);
            }
            localStorage.removeItem('zbet_user');
            window.location.href = 'zbet-login.html';
        };
        
        // Close modals when clicking outside
        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };
