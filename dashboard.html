<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zbet - Gaming Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .user-details {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            text-align: right;
        }

        .username {
            font-weight: bold;
            color: #ffd700;
        }

        .email {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .balance {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-weight: bold;
        }

        .balance span {
            color: #ffd700;
            font-size: 1.2rem;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Welcome Section */
        .welcome-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .welcome-section h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .welcome-section p {
            opacity: 0.9;
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        /* Game Card */
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .game-card.active {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #ffd700;
        }

        .game-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .game-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .game-description {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 1rem;
        }

        /* Game Area */
        .game-area {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bet Controls */
        .bet-controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        input, select {
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #ffd89b, #c7e9fb);
            color: #333;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Result Display */
        .result {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 1.1rem;
        }

        .win {
            color: #4caf50;
            font-weight: bold;
        }

        .lose {
            color: #f44336;
            font-weight: bold;
        }

        /* Dice Game */
        .dice-container {
            text-align: center;
        }

        .dice {
            font-size: 5rem;
            margin: 1rem 0;
            animation: roll 0.5s ease;
        }

        @keyframes roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Slot Machine */
        .slot-machine {
            text-align: center;
        }

        .reels {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .reel {
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        /* Coin Flip */
        .coin-flip {
            text-align: center;
        }

        .coin {
            font-size: 5rem;
            margin: 1rem 0;
            transition: transform 0.3s ease;
        }

        .coin.flipping {
            animation: flip 0.6s ease;
        }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(720deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
            
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            
            .user-info {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎲 zbet</div>
        <div class="user-info">
            <div class="user-details">
                <div class="username" id="username">Loading...</div>
                <div class="email" id="email">Loading...</div>
            </div>
            <div class="balance">Balance: <span id="balance">0</span> ZBET</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-section">
            <h2>Welcome to zbet! 🎮</h2>
            <p>Choose your game and start betting!</p>
        </div>
        
        <div class="games-grid" id="gamesGrid">
            <!-- Games will be dynamically inserted -->
        </div>
        <div id="gameArea" class="game-area"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCAfsKcVP7OUo870TKkBnk4BfDEq9LnAK8",
            authDomain: "newporoject-c6f66.firebaseapp.com",
            databaseURL: "https://newporoject-c6f66-default-rtdb.firebaseio.com",
            projectId: "newporoject-c6f66",
            storageBucket: "newporoject-c6f66.appspot.com",
            messagingSenderId: "733557611631",
            appId: "1:733557611631:web:02c9377f56d614ff3b019a",
            measurementId: "G-53BEVW33FP"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        let currentUser = null;
        let userBalance = 0;
        let userData = null;
        
        // Game Data
        const games = [
            {
                id: 'dice',
                name: '🎲 Dice Roll',
                description: 'Bet on a number between 1-6. Win 5x your bet!',
                multiplier: 5,
                minBet: 10,
                maxBet: 500
            },
            {
                id: 'coinflip',
                name: '🪙 Coin Flip',
                description: 'Bet on Heads or Tails. Win 2x your bet!',
                multiplier: 2,
                minBet: 10,
                maxBet: 500
            },
            {
                id: 'slots',
                name: '🎰 Slot Machine',
                description: 'Match 3 symbols to win! Jackpot: 10x your bet!',
                multiplier: 10,
                minBet: 20,
                maxBet: 300
            },
            {
                id: 'roulette',
                name: '🎯 Roulette',
                description: 'Bet on Red, Black, or Green 0. Win up to 35x!',
                minBet: 10,
                maxBet: 500
            },
            {
                id: 'cards',
                name: '🃏 Card Guess',
                description: 'Guess higher or lower than the card. Win 2x!',
                multiplier: 2,
                minBet: 10,
                maxBet: 400
            }
        ];
        
        // Check authentication
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData(user.uid);
            } else {
                // Check if Telegram user exists in localStorage
                const localUser = localStorage.getItem('zbet_user');
                if (localUser) {
                    const parsedUser = JSON.parse(localUser);
                    await loadTelegramUserData(parsedUser);
                } else {
                    window.location.href = 'zbet-login.html';
                }
            }
        });
        
        async function loadTelegramUserData(userInfo) {
            const userRef = ref(database, `users/${userInfo.uid}`);
            const snapshot = await get(userRef);
            
            if (snapshot.exists()) {
                userData = snapshot.val();
                userBalance = userData.balance || 1000;
                document.getElementById('username').textContent = userData.username;
                document.getElementById('email').textContent = userData.email;
                document.getElementById('balance').textContent = userBalance;
            }
        }
        
        async function loadUserData(uid) {
            const userRef = ref(database, `users/${uid}`);
            const snapshot = await get(userRef);
            
            if (snapshot.exists()) {
                userData = snapshot.val();
                userBalance = userData.balance || 1000;
                document.getElementById('username').textContent = userData.username;
                document.getElementById('email').textContent = userData.email;
                document.getElementById('balance').textContent = userBalance;
            }
        }
        
        async function updateBalance(newBalance) {
            if (!userData) return;
            
            const userRef = ref(database, `users/${userData.uid}`);
            await update(userRef, {
                balance: newBalance,
                lastUpdated: new Date().toISOString()
            });
            userBalance = newBalance;
            document.getElementById('balance').textContent = userBalance;
        }
        
        async function saveBetHistory(game, betAmount, winAmount, result) {
            if (!userData) return;
            
            const betRef = ref(database, `users/${userData.uid}/bets/${Date.now()}`);
            await set(betRef, {
                game: game.name,
                betAmount: betAmount,
                winAmount: winAmount,
                result: result,
                timestamp: new Date().toISOString()
            });
            
            // Update stats
            const statsRef = ref(database, `users/${userData.uid}`);
            await update(statsRef, {
                totalBets: (userData.totalBets || 0) + 1,
                totalWins: (userData.totalWins || 0) + (winAmount > 0 ? 1 : 0),
                totalLosses: (userData.totalLosses || 0) + (winAmount === 0 ? 1 : 0)
            });
        }
        
        // Game functions (same as before but with Firebase integration)
        function isValidBet(amount, game) {
            if (isNaN(amount) || amount < game.minBet) {
                alert(`Minimum bet is ${game.minBet} ZBET`);
                return false;
            }
            if (amount > game.maxBet) {
                alert(`Maximum bet is ${game.maxBet} ZBET`);
                return false;
            }
            if (amount > userBalance) {
                alert('Insufficient balance!');
                return false;
            }
            return true;
        }
        
        async function processBet(amount, game, winAmount, resultMessage) {
            const newBalance = userBalance - amount + winAmount;
            await updateBalance(newBalance);
            await saveBetHistory(game, amount, winAmount, winAmount > 0 ? 'win' : 'loss');
            
            if (winAmount > 0) {
                return `<div class="result win">🎉 WIN! ${resultMessage} You won ${winAmount} ZBET! 🎉</div>`;
            } else {
                return `<div class="result lose">😢 LOSE! ${resultMessage} You lost ${amount} ZBET! 😢</div>`;
            }
        }
        
        // Render games grid
        function renderGamesGrid() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = games.map(game => `
                <div class="game-card" onclick="selectGame('${game.id}')">
                    <div class="game-icon">${game.icon || game.name.split(' ')[0]}</div>
                    <div class="game-title">${game.name}</div>
                    <div class="game-description">${game.description}</div>
                    <div>Min: ${game.minBet} | Max: ${game.maxBet}</div>
                </div>
            `).join('');
        }
        
        // Add icons to games
        games[0].icon = '🎲';
        games[1].icon = '🪙';
        games[2].icon = '🎰';
        games[3].icon = '🎯';
        games[4].icon = '🃏';
        
        // Game render functions (simplified - add all your game functions here)
        window.selectGame = function(gameId) {
            const gameArea = document.getElementById('gameArea');
            gameArea.innerHTML = `<h2>Game Selected: ${gameId}</h2><p>Game implementation here...</p>`;
        };
        
        window.logout = async () => {
            if (auth.currentUser) {
                await signOut(auth);
            }
            localStorage.removeItem('zbet_user');
            window.location.href = 'zbet-login.html';
        };
        
        // Initialize
        renderGamesGrid();
        selectGame('dice');
        
        // Make functions global
        window.selectGame = selectGame;
        window.processBet = processBet;
        window.isValidBet = isValidBet;
    </script>
</body>
</html>
